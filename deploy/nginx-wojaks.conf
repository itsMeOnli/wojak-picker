# Nginx server block for self-hosting the Wojak library.
#
# 1. Copy this to /etc/nginx/sites-available/wojaks.conf
# 2. Replace wojaks.example.com with your domain.
# 3. ln -s /etc/nginx/sites-available/wojaks.conf /etc/nginx/sites-enabled/
# 4. mkdir -p /var/www/wojaks   (deploy script rsyncs images/ thumbs/ wojaks.json here)
# 5. nginx -t && systemctl reload nginx
# 6. TLS: certbot --nginx -d wojaks.example.com   (adds the 443 block automatically)

server {
    listen 80;
    listen [::]:80;
    server_name wojaks.example.com;

    root /var/www/wojaks;

    # Allow the Raycast extension (and anything else) to fetch these public assets.
    add_header Access-Control-Allow-Origin "*" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Metadata manifest: small, changes only on redeploy. Cache briefly.
    location = /wojaks.json {
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600";
    }

    # Images and thumbnails are content-addressed by filename and effectively immutable.
    location ~* ^/(images|thumbs)/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        try_files $uri =404;
        types {
            image/png   png;
            image/jpeg  jpg jpeg;
            image/webp  webp;
            image/gif   gif;
        }
    }

    # Don't expose anything else under the web root.
    location / {
        return 404;
    }

    access_log /var/log/nginx/wojaks.access.log;
    error_log  /var/log/nginx/wojaks.error.log;
}
